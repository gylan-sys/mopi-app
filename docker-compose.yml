version: '3.8'

services:
  coffee-pos:
    image: coffee-pos:latest
    build: .
    container_name: coffee-pos
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=your_secret_here
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: always
